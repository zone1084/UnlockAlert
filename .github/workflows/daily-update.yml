name: Daily Token Data Update

on:
  schedule:
    # 每天 UTC 2:00（北京时间 10:00）运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-token-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Update token prices and unlock data
        run: |
          # 获取最新价格数据并更新 data/tokens.json
          node -e "
          const fs = require('fs');
          const https = require('https');
          
          const dataPath = 'data/tokens.json';
          let tokens = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
          
          // 获取 CoinGecko 最新价格
          const ids = tokens.map(t => t.symbol.toLowerCase()).join(',');
          const url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + 
            tokens.map(t => {
              const map = {
                'arb': 'arbitrum', 'apt': 'aptos', 'sui': 'sui',
                'wld': 'worldcoin', 'ena': 'ethena', 'op': 'optimism',
                'dydx': 'dydx', 'sei': 'sei-network', 'zk': 'zksync',
                'w': 'wormhole', 'tia': 'celestia', 'imx': 'immutable-x',
                'strk': 'starknet'
              };
              return map[t.symbol.toLowerCase()] || t.name.toLowerCase();
            }).join(',') + '&vs_currencies=usd';
          
          https.get(url, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              try {
                const prices = JSON.parse(data);
                const idMap = {
                  'arbitrum': 'ARB', 'aptos': 'APT', 'sui': 'SUI',
                  'worldcoin': 'WLD', 'ethena': 'ENA', 'optimism': 'OP',
                  'dydx': 'DYDX', 'sei-network': 'SEI', 'zksync': 'ZK',
                  'wormhole': 'W', 'celestia': 'TIA',
                  'immutable-x': 'IMX', 'starknet': 'STRK'
                };
                
                for (const [apiId, symbol] of Object.entries(idMap)) {
                  if (prices[apiId] && prices[apiId].usd) {
                    const token = tokens.find(t => t.symbol === symbol);
                    if (token) {
                      token.currentPrice = prices[apiId].usd;
                    }
                  }
                }
                
                fs.writeFileSync(dataPath, JSON.stringify(tokens, null, 2));
                console.log('✅ 价格数据更新完成');
              } catch(e) {
                console.log('价格更新跳过:', e.message);
              }
            });
          }).on('error', (e) => {
            console.log('API请求失败，保留原数据:', e.message);
          });
          "
      
      - name: Commit and push updated data
        run: |
          git config --local user.email "bot@unlockalert.app"
          git config --local user.name "UnlockAlert Bot"
          git add data/tokens.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "🔄 Auto-update token data $(date +'%Y-%m-%d')" && git push)
