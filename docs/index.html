<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>🔓 解锁预警</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔓</text></svg>">

<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #232340;
  --accent: #4f8cff;
  --accent2: #7c5cfc;
  --danger: #ff4757;
  --orange: #ffa502;
  --green: #2ed573;
  --text: #e8e8f0;
  --text2: #8888a0;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-bottom: var(--safe-bottom);
  min-height: 100vh;
}

/* ===== Header ===== */
.header {
  padding: 16px 16px 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  flex: 1;
}
.header .badge {
  font-size: 12px;
  color: var(--text2);
  background: var(--card);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ===== Search ===== */
.search-wrap {
  padding: 8px 16px 12px;
  position: sticky;
  top: 56px;
  z-index: 99;
  background: var(--bg);
}
.search-wrap input {
  width: 100%;
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.search-wrap input::placeholder { color: var(--text2); }

/* ===== Filters ===== */
.filters {
  display: flex;
  gap: 8px;
  padding: 0 16px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  flex: 0 0 auto;
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  background: var(--card);
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: .2s;
}
.filter-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ===== Token List ===== */
.list {
  padding: 0 16px 80px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.token-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: .15s;
  animation: fadeIn .3s ease;
}
.token-card:active { transform: scale(0.98); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.token-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--card2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  overflow: hidden;
  flex-shrink: 0;
}
.token-icon img { width: 100%; height: 100%; object-fit: cover; }

.token-info { flex: 1; min-width: 0; }
.token-name {
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.token-name .symbol { color: var(--text2); font-weight: 400; font-size: 13px; }
.token-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.tag.danger { background: rgba(255,71,87,.15); color: var(--danger); }
.tag.warning { background: rgba(255,165,2,.15); color: var(--orange); }
.tag.info { background: rgba(79,140,255,.15); color: var(--accent); }
.tag.done { background: rgba(46,213,115,.15); color: var(--green); }

.token-value {
  text-align: right;
  flex-shrink: 0;
}
.token-value .amount {
  font-size: 15px;
  font-weight: 700;
  color: var(--danger);
}
.token-value .pct {
  font-size: 12px;
  color: var(--text2);
}

/* ===== Bottom Nav ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: var(--card);
  border-top: 1px solid rgba(255,255,255,.06);
  padding-bottom: var(--safe-bottom);
  z-index: 200;
}
.nav-item {
  flex: 1;
  padding: 8px 0 calc(8px + var(--safe-bottom));
  text-align: center;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: .2s;
  border: none;
  background: none;
}
.nav-item.active { color: var(--accent); }
.nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }

/* ===== Detail Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.7);
  z-index: 500;
  justify-content: center;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,.15);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 24px;
  cursor: pointer;
  padding: 4px;
}

.modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.modal-icon { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
.modal-icon img { width: 100%; height: 100%; object-fit: cover; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-price { font-size: 24px; font-weight: 700; color: var(--accent); }
.modal-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

.countdown {
  display: flex; gap: 16px; justify-content: center;
  background: var(--card2); border-radius: 12px; padding: 16px; margin-bottom: 20px;
}
.countdown-item { text-align: center; }
.countdown-num {
  font-size: 28px; font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.countdown-label { font-size: 11px; color: var(--text2); }

.section-title {
  font-size: 15px; font-weight: 600; margin-bottom: 12px; margin-top: 20px;
}
.unlock-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.05);
}
.unlock-item:last-child { border: none; }
.unlock-date { font-size: 14px; }
.unlock-date small { display: block; font-size: 11px; color: var(--text2); margin-top: 2px; }
.unlock-val { text-align: right; }
.unlock-val .num { font-size: 14px; font-weight: 600; color: var(--danger); }
.unlock-val .sub { font-size: 11px; color: var(--text2); }

/* ===== Watchlist Tab ===== */
.page { display: none; }
.page.active { display: block; }

.watchlist-empty {
  text-align: center;
  padding: 80px 32px;
  color: var(--text2);
}
.watchlist-empty .big-icon { font-size: 48px; margin-bottom: 16px; }

/* ===== Loading ===== */
.loading {
  text-align: center;
  padding: 60px 0;
  color: var(--text2);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--card);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--text); padding: 10px 20px;
  border-radius: 10px; font-size: 13px; z-index: 999;
  opacity: 0; transition: .3s; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <h1>🔓 解锁预警</h1>
  <span class="badge" id="tokenCount">加载中...</span>
</div>

<!-- ===== Search ===== -->
<div class="search-wrap">
  <input type="search" id="search" placeholder="搜索代币名称或符号..." autocomplete="off">
</div>

<!-- ===== Filters ===== -->
<div class="filters" id="filters"></div>

<!-- ===== Pages ===== -->
<div id="page-home" class="page active">
  <div class="list" id="tokenList">
    <div class="loading"><div class="spinner"></div>正在加载数据...</div>
  </div>
</div>

<div id="page-watchlist" class="page">
  <div class="list" id="watchlistContent"></div>
</div>

<div id="page-settings" class="page">
  <div style="padding: 20px 16px 80px;">
    <h2 style="font-size:20px;font-weight:700;margin-bottom:16px;">⚙️ 设置</h2>
    <div style="background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px;">数据来源</div>
      <div style="font-size:12px;color:var(--text2);">CoinGecko API + GitHub Actions 每日更新</div>
    </div>
    <div style="background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px;">版本</div>
      <div style="font-size:12px;color:var(--text2);">1.0.0 · Web版</div>
    </div>
    <div style="background:var(--card);border-radius:14px;padding:16px;margin-bottom:20px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;">⚠️ 免责声明</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.5;">
        本工具展示的数据来源于 CoinGecko 公开 API 及项目方公开披露信息，仅供参考，不构成任何投资建议。代币解锁事件不必然导致价格下跌。投资有风险，决策需谨慎。
      </div>
    </div>
  </div>
</div>

<!-- ===== Detail Modal ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ===== Bottom Nav ===== -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('home')">
    <span class="icon">🔓</span> 解锁
  </button>
  <button class="nav-item" onclick="switchTab('watchlist')">
    <span class="icon">⭐</span> 关注
  </button>
  <button class="nav-item" onclick="switchTab('settings')">
    <span class="icon">⚙️</span> 设置
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ===== Data =====
let allTokens = [];
let watchlist = JSON.parse(localStorage.getItem('uw_watchlist') || '[]');
let currentFilter = 'all';

// ===== Fetch Data =====
async function loadData() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/zone1084/UnlockAlert/master/data/tokens.json?' + Date.now());
    allTokens = await res.json();
    document.getElementById('tokenCount').textContent = allTokens.length + '个代币';
    render();
  } catch(e) {
    document.getElementById('tokenList').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--text2);">
        <div style="font-size:40px;margin-bottom:12px;">😅</div>
        <div>加载失败，下拉刷新试试</div>
      </div>
    `;
  }
}

// ===== Filter Logic =====
function getFiltered() {
  const now = new Date();
  const week = new Date(now.getTime() + 7*86400000);
  const twoWeeks = new Date(now.getTime() + 14*86400000);
  const month = new Date(now.getTime() + 30*86400000);
  
  let list = [...allTokens];
  
  // Apply filter
  switch(currentFilter) {
    case 'thisWeek':
      list = list.filter(t => t.unlocks?.some(u => new Date(u.date) > now && new Date(u.date) < week));
      break;
    case 'nextWeek':
      list = list.filter(t => t.unlocks?.some(u => new Date(u.date) > week && new Date(u.date) < twoWeeks));
      break;
    case 'thisMonth':
      list = list.filter(t => t.unlocks?.some(u => new Date(u.date) > now && new Date(u.date) < month));
      break;
    case 'large':
      list = list.filter(t => t.unlocks?.some(u => new Date(u.date) > now && u.amount * t.currentPrice > 10000000));
      break;
  }
  
  // Apply search
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (q) {
    list = list.filter(t => 
      t.name.toLowerCase().includes(q) || 
      t.symbol.toLowerCase().includes(q)
    );
  }
  
  // Sort by next unlock
  list.sort((a, b) => {
    const da = getNextUnlock(a)?.date || '9999';
    const db = getNextUnlock(b)?.date || '9999';
    return new Date(da) - new Date(db);
  });
  
  return list;
}

function getNextUnlock(token) {
  return (token.unlocks || [])
    .filter(u => new Date(u.date) > new Date())
    .sort((a, b) => new Date(a.date) - new Date(b.date))[0];
}

function getDaysUntil(date) {
  const diff = new Date(date) - new Date();
  return Math.floor(diff / 86400000);
}

function fmtUSD(v) {
  if (!v) return '$0';
  const a = Math.abs(v);
  if (a >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (a >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return '$' + (v/1e3).toFixed(2) + 'K';
  return '$' + v.toFixed(2);
}

function fmtNum(v) {
  if (!v) return '0';
  const a = Math.abs(v);
  if (a >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if (a >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return v.toLocaleString();
}

// ===== Render =====
function render() {
  renderFilters();
  renderList();
  renderWatchlist();
}

function renderFilters() {
  const filters = [
    {id:'all', label:'全部'},
    {id:'thisWeek', label:'本周'},
    {id:'nextWeek', label:'下周'},
    {id:'thisMonth', label:'本月'},
    {id:'large', label:'大额 >$10M'},
  ];
  document.getElementById('filters').innerHTML = filters.map(f => 
    `<button class="filter-btn ${f.id === currentFilter ? 'active' : ''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join('');
}

function setFilter(id) {
  currentFilter = id;
  render();
}

function renderList() {
  const list = getFiltered();
  const container = document.getElementById('tokenList');
  
  if (list.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text2);">
      <div style="font-size:40px;margin-bottom:12px;">🔍</div>
      <div>没有找到匹配的代币</div>
    </div>`;
    return;
  }
  
  container.innerHTML = list.map(t => {
    const next = getNextUnlock(t);
    const followed = watchlist.includes(t.symbol);
    const days = next ? getDaysUntil(next.date) : null;
    
    let tag = '';
    if (days !== null && days <= 0) tag = '<span class="tag danger">今日解锁</span>';
    else if (days !== null && days <= 7) tag = `<span class="tag warning">${days}天后</span>`;
    else if (days !== null) tag = `<span class="tag info">${days}天后</span>`;
    
    const val = next ? fmtUSD(next.amount * t.currentPrice) : '—';
    const pct = next && t.circulatingSupply ? ((next.amount / t.circulatingSupply) * 100).toFixed(1) + '%' : '—';
    
    return `
    <div class="token-card" onclick="openDetail('${t.symbol}')">
      <div class="token-icon">${t.imageUrl ? `<img src="${t.imageUrl}" alt="${t.symbol}" loading="lazy">` : t.symbol[0]}</div>
      <div class="token-info">
        <div class="token-name">${t.symbol} <span class="symbol">${t.name}</span></div>
        <div class="token-meta">${tag} ${next ? new Date(next.date).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}) : ''}</div>
      </div>
      <div class="token-value">
        <div class="amount">${val}</div>
        <div class="pct">${pct}</div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('tokenCount').textContent = list.length + '/' + allTokens.length + '个代币';
}

function renderWatchlist() {
  const container = document.getElementById('watchlistContent');
  const watched = allTokens.filter(t => watchlist.includes(t.symbol));
  
  if (watched.length === 0) {
    container.innerHTML = `<div class="watchlist-empty">
      <div class="big-icon">⭐</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px;">还没有关注任何代币</div>
      <div style="font-size:14px;">在「解锁」页面点击代币后关注</div>
    </div>`;
    return;
  }
  
  container.innerHTML = watched.map(t => {
    const next = getNextUnlock(t);
    const days = next ? getDaysUntil(next.date) : null;
    return `
    <div class="token-card" onclick="openDetail('${t.symbol}')">
      <div class="token-icon">${t.imageUrl ? `<img src="${t.imageUrl}" alt="${t.symbol}" loading="lazy">` : t.symbol[0]}</div>
      <div class="token-info">
        <div class="token-name">${t.symbol} <span class="symbol">${t.name}</span></div>
        <div class="token-meta">${days !== null && days <= 7 ? `<span class="tag ${days<=0?'danger':'warning'}">${days<=0?'今日':days+'天后'}</span>` : ''} ${next ? next.date.slice(0,10) : ''}</div>
      </div>
      <div class="token-value">
        <div class="amount">${next ? fmtUSD(next.amount * t.currentPrice) : '—'}</div>
      </div>
    </div>`;
  }).join('');
}

// ===== Detail Modal =====
function openDetail(symbol) {
  const t = allTokens.find(x => x.symbol === symbol);
  if (!t) return;
  
  const next = getNextUnlock(t);
  const followed = watchlist.includes(t.symbol);
  
  let countdownHtml = '';
  if (next) {
    const d = new Date(next.date);
    countdownHtml = `
    <div class="countdown" id="countdown-${t.symbol}">
      <div class="countdown-item"><div class="countdown-num" id="cd-d-${t.symbol}">--</div><div class="countdown-label">天</div></div>
      <div class="countdown-item"><div class="countdown-num" id="cd-h-${t.symbol}">--</div><div class="countdown-label">时</div></div>
      <div class="countdown-item"><div class="countdown-num" id="cd-m-${t.symbol}">--</div><div class="countdown-label">分</div></div>
      <div class="countdown-item"><div class="countdown-num" id="cd-s-${t.symbol}">--</div><div class="countdown-label">秒</div></div>
    </div>`;
  }
  
  const upcoming = (t.unlocks || []).filter(u => new Date(u.date) > new Date()).sort((a,b) => new Date(a.date)-new Date(b.date));
  const past = (t.unlocks || []).filter(u => new Date(u.date) <= new Date()).sort((a,b) => new Date(b.date)-new Date(a.date));
  
  let unlocksHtml = '';
  if (upcoming.length) {
    unlocksHtml += `<div class="section-title">⏰ 即将解锁 (${upcoming.length})</div>`;
    upcoming.forEach(u => {
      const d = new Date(u.date);
      const val = fmtUSD(u.amount * t.currentPrice);
      const pct = t.circulatingSupply ? ((u.amount/t.circulatingSupply)*100).toFixed(1)+'%' : '—';
      unlocksHtml += `<div class="unlock-item">
        <div class="unlock-date">${d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',year:'numeric'})}<br><small>${catLabel(u.category)}${u.description?' · '+u.description:''}</small></div>
        <div class="unlock-val"><div class="num">${val}</div><div class="sub">${pct} · ${fmtNum(u.amount)}</div></div>
      </div>`;
    });
  }
  
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-header">
      <div class="modal-icon">${t.imageUrl ? `<img src="${t.imageUrl}">` : t.symbol[0]}</div>
      <div>
        <div class="modal-title">${t.name} (${t.symbol})</div>
        <div class="modal-price">$${t.currentPrice.toFixed(2)}</div>
        <div class="modal-sub">市值 ${fmtUSD(t.marketCap)} · 流通 ${fmtNum(t.circulatingSupply)}/${fmtNum(t.totalSupply)}</div>
      </div>
    </div>
    ${countdownHtml}
    <button style="width:100%;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;background:${followed?'#ff4757':'#4f8cff'};color:#fff;cursor:pointer;margin-bottom:12px;" onclick="toggleWatch('${t.symbol}')">
      ${followed ? '⭐ 取消关注' : '🔔 关注此代币'}
    </button>
    ${unlocksHtml}
    ${past.length ? `<div class="section-title">✅ 已解锁 (${past.length})</div>` + past.slice(0,5).map(u => {
      const val = fmtUSD(u.amount * t.currentPrice);
      return `<div class="unlock-item" style="opacity:.5">
        <div class="unlock-date">${new Date(u.date).toLocaleDateString('zh-CN',{month:'short',day:'numeric',year:'numeric'})}<br><small>${catLabel(u.category)}</small></div>
        <div class="unlock-val"><div class="num">${val}</div></div>
      </div>`;
    }).join('') + (past.length > 5 ? `<div style="text-align:center;color:var(--text2);font-size:12px;padding:8px;">及${past.length-5}次更早的解锁</div>` : '') : ''}
    <div style="margin-top:20px;padding:12px;background:var(--card2);border-radius:10px;font-size:11px;color:var(--text2);line-height:1.5;">
      ⚠️ 数据来源于 CoinGecko 公开 API，仅供参考，不构成投资建议。
    </div>
  `;
  
  document.getElementById('modal').classList.add('open');
  
  // Start countdown
  if (next) startCountdown(t.symbol, next.date);
}

function startCountdown(symbol, targetDate) {
  function tick() {
    const diff = new Date(targetDate) - new Date();
    if (diff <= 0) { document.getElementById(`cd-d-${symbol}`).textContent = '00'; document.getElementById(`cd-h-${symbol}`).textContent = '00'; document.getElementById(`cd-m-${symbol}`).textContent = '00'; document.getElementById(`cd-s-${symbol}`).textContent = '00'; return; }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    document.getElementById(`cd-d-${symbol}`).textContent = String(d).padStart(2,'0');
    document.getElementById(`cd-h-${symbol}`).textContent = String(h).padStart(2,'0');
    document.getElementById(`cd-m-${symbol}`).textContent = String(m).padStart(2,'0');
    document.getElementById(`cd-s-${symbol}`).textContent = String(s).padStart(2,'0');
  }
  tick();
  if (window._cdInterval) clearInterval(window._cdInterval);
  window._cdInterval = setInterval(tick, 1000);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  if (window._cdInterval) clearInterval(window._cdInterval);
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function catLabel(cat) {
  const m = {'team':'团队','vc':'机构','advisor':'顾问','community':'社区','foundation':'基金会','treasury':'国库'};
  return m[cat] || cat;
}

// ===== Watchlist =====
function toggleWatch(sym) {
  const idx = watchlist.indexOf(sym);
  if (idx > -1) watchlist.splice(idx, 1);
  else watchlist.push(sym);
  localStorage.setItem('uw_watchlist', JSON.stringify(watchlist));
  render();
  showToast(idx > -1 ? '已取消关注 ' + sym : '已关注 ' + sym);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== Tab Switching =====
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item')[['home','watchlist','settings'].indexOf(name)].classList.add('active');
}

// ===== Search =====
document.getElementById('search').addEventListener('input', render);

// ===== Init =====
loadData();

// Pull to refresh
let touchStart = 0;
document.addEventListener('touchstart', e => { touchStart = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientY - touchStart;
  if (diff > 100 && window.scrollY < 10) {
    loadData();
  }
});
</script>
